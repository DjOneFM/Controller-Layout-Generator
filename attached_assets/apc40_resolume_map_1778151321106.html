<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>APC40 mkII — Resolume Mapping</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0f; color: #e2e8f0; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; gap: 10px; }
#toolbar { display: flex; align-items: center; gap: 10px; background: #1a1a20; border: 1px solid #2a2a32; border-radius: 8px; padding: 8px 14px; flex-wrap: wrap; }
.tb-title { font-size: 12px; color: #e2e8f0; font-weight: bold; }
.stat { font-size: 11px; padding: 4px 11px; border-radius: 5px; }
.stat-mapped   { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.4); }
.stat-unmapped { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
#legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #8a8a96; }
.legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
#controller-wrap { position: relative; display: inline-block; line-height: 0; flex-shrink: 0; }
#controller-img { display: block; max-width: min(98vw, 1200px); max-height: calc(100vh - 150px); object-fit: contain; user-select: none; }
.dim { position: absolute; inset: 0; background: rgba(0,0,0,0.22); pointer-events: none; }
.zone { position: absolute; border-radius: 3px; cursor: crosshair; box-sizing: border-box; transition: filter 0.08s; }
.tooltip {
  position: fixed; background: #0c1220; border-radius: 10px; padding: 0;
  pointer-events: none; z-index: 9999;
  box-shadow: 0 10px 40px rgba(0,0,0,0.95), 0 0 0 1px rgba(255,255,255,0.07);
  width: 280px; overflow: hidden;
}
.tip-header { padding: 10px 16px 8px; border-bottom: 1px solid #1e293b; background: #111827; }
.tip-hw-label { font-size: 9px; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
.tip-hw-name  { font-size: 14px; color: #e2e8f0; font-weight: bold; line-height: 1.3; }
.tip-body { padding: 10px 16px 12px; }
.tip-res-label { font-size: 9px; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.tip-res-mapped   { font-size: 14px; color: #22c55e; font-weight: bold; line-height: 1.4; }
.tip-res-unmapped { font-size: 13px; color: #f87171; line-height: 1.4; }
.tip-badge { display: inline-block; border-radius: 4px; font-size: 10px; padding: 2px 9px; margin-top: 8px; font-weight: bold; letter-spacing: 0.05em; }
.tip-badge-mapped   { background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid rgba(34,197,94,0.5); }
.tip-badge-unmapped { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.4); }
#info-bar { font-size: 11px; color: #475569; min-height: 18px; }
</style>
</head>

const MAPPED_STYLE   = {bg:"rgba(34,197,94,0.25)",   border:"#22c55e"};
const UNMAPPED_STYLE = {bg:"rgba(239,68,68,0.20)",   border:"#ef4444"};
const MAPPED_HOVER   = {bg:"rgba(34,197,94,0.50)",   border:"#4ade80"};
const UNMAPPED_HOVER = {bg:"rgba(239,68,68,0.42)",   border:"#f87171"};

let activeTooltip = null;
const wrap = document.getElementById('controller-wrap');

function positionTooltip(tip, mx, my) {
  const tw=280, pad=18, vw=window.innerWidth, vh=window.innerHeight;
  let left=mx+pad, top=my+pad;
  if (left+tw > vw-pad) left = mx-tw-pad;
  if (top+tip.offsetHeight > vh-pad) top = my-tip.offsetHeight-pad;
  if (left<pad) left=pad; if (top<pad) top=pad;
  tip.style.left=left+'px'; tip.style.top=top+'px';
}

function showTooltip(zone, e) {
  removeTooltip();
  const mapped = RESOLUME_MAP[zone.id];
  const tip = document.createElement('div');
  tip.className = 'tooltip';
  tip.innerHTML =
    '<div class="tip-header">' +
      '<div class="tip-hw-label">Hardware Control</div>' +
      '<div class="tip-hw-name">' + zone.label + '</div>' +
    '</div>' +
    '<div class="tip-body">' +
      '<div class="tip-res-label">Resolume Avenue 6 Default</div>' +
      (mapped
        ? '<div class="tip-res-mapped">' + mapped + '</div><div class="tip-badge tip-badge-mapped">&#10003; MAPPED</div>'
        : '<div class="tip-res-unmapped">Not assigned in default mapping</div><div class="tip-badge tip-badge-unmapped">&#9711; UNMAPPED &mdash; available to assign</div>') +
    '</div>';
  document.body.appendChild(tip);
  positionTooltip(tip, e.clientX, e.clientY);
  activeTooltip = tip;
  const info = document.getElementById('info-bar');
  info.innerHTML = mapped
    ? '<span style="color:#86efac">' + zone.label + '</span> <span style="color:#334155">→</span> <span style="color:#22c55e">' + mapped + '</span>'
    : '<span style="color:#fca5a5">' + zone.label + '</span><span style="color:#ef4444"> — unmapped (available to assign)</span>';
}

function removeTooltip() {
  if (activeTooltip) { activeTooltip.remove(); activeTooltip = null; }
}

function renderZones() {
  document.querySelectorAll('.zone').forEach(el => el.remove());
  ZONES.forEach(zone => {
    const mapped = RESOLUME_MAP[zone.id] != null;
    const s = mapped ? MAPPED_STYLE : UNMAPPED_STYLE;
    const h = mapped ? MAPPED_HOVER : UNMAPPED_HOVER;
    const el = document.createElement('div');
    el.className = 'zone';
    el.style.cssText = `left:${zone.x}%;top:${zone.y}%;width:${zone.w}%;height:${zone.h}%;background:${s.bg};border:1.5px solid ${s.border};`;
    el.addEventListener('mouseenter', e => {
      el.style.background = h.bg;
      el.style.borderColor = h.border;
      showTooltip(zone, e);
    });
    el.addEventListener('mousemove', e => {
      if (activeTooltip) positionTooltip(activeTooltip, e.clientX, e.clientY);
    });
    el.addEventListener('mouseleave', () => {
      el.style.background = s.bg;
      el.style.borderColor = s.border;
      removeTooltip();
      document.getElementById('info-bar').textContent = 'Hover any control to see its Resolume mapping';
    });
    wrap.appendChild(el);
  });
}

renderZones();
</script>
